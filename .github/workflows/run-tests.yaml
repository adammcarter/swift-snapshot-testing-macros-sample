name: Run Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # The point of this package is to catch library changes that only break consumers, and
  # it depends on a branch rather than a tag. A nightly run surfaces that breakage without
  # waiting for someone to push here.
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer-tests:
    name: Consumer Tests (${{ matrix.xcode }} / ${{ matrix.platform.name }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        xcode: ['26.4', '26.5']
        # Each platform compiles the other's sources out, so neither substitutes for the
        # other: macOS never sees the UIKit overloads, iOS never sees the AppKit ones.
        platform:
          - name: macOS
            destination: 'platform=macOS'
          - name: iOS
            destination: 'platform=iOS Simulator,name=iPhone 17'

    steps:
      - name: Select Xcode version (${{ matrix.xcode }})
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve against the library
        run: swift package resolve

      # SwiftPM names the implicit scheme after the package with a `-Package` suffix.
      # The dependency's own schemes are visible here too; this one builds only ours.
      # `-skipMacroValidation` is required, not incidental: xcodebuild refuses to run a
      # macro it has not been told to trust, and there is no one to click Trust & Enable
      # on a runner. Adopters building through xcodebuild hit exactly this.
      - name: Run consumer tests (${{ matrix.platform.name }})
        run: |
          xcodebuild test \
            -scheme swift-snapshot-testing-macros-sample-Package \
            -destination '${{ matrix.platform.destination }}' \
            -skipMacroValidation

  migration-proof:
    name: Migration Proof (${{ matrix.xcode }} / ${{ matrix.platform.name }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        xcode: ['26.4', '26.5']
        platform:
          - name: macOS
            destination: 'platform=macOS'
          - name: iOS
            destination: 'platform=iOS Simulator,name=iPhone 17'

    steps:
      - name: Select Xcode version (${{ matrix.xcode }})
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Checkout sample
        uses: actions/checkout@v4
        with:
          path: sample

      # The migrator is a separate tool. Check it out so its real CLI does the migration —
      # nothing about the transform is faked or pre-baked here.
      - name: Checkout migrator
        uses: actions/checkout@v4
        with:
          repository: adammcarter/swift-snapshot-testing-macros-migrator
          path: swift-snapshot-testing-macros-migrator

      # Runs the real migrator over the legacy fixture, then builds the result. A clean build is
      # the proof: the deprecated macros do not compile on Xcode 26.4+, so an old-macro suite that
      # compiles after migration is the migration path working end to end.
      - name: Migrate a legacy suite and build it (${{ matrix.platform.name }})
        run: |
          sample/MigrationProof/migrate-and-build.sh \
            "$GITHUB_WORKSPACE/swift-snapshot-testing-macros-migrator" \
            '${{ matrix.platform.destination }}'
